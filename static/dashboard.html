<head>
    <link rel="stylesheet" href="dashboard.css">
    <script src="vendor/gauge.min.js"></script>
    <script src="dashboard.js" defer></script>
</head>
<body>
    <div id="overlay" class="horizontal-container footer">
        <canvas id="rpmGauge"></canvas>
        <canvas id="mphGauge"></canvas>
        <canvas id="brakeGauge"></canvas>
        <canvas id="accGauge"></canvas>

        <div class="telemetry-table-container">
            <table class="telemetry-table">
                <tr>
                    <td class="label">Coolant</td>
                    <td id="coolantTemp" class="value">-- °F</td>

                    <td class="label">IAT</td>
                    <td id="iat" class="value">-- °F</td>
                </tr>
                <tr>
                    <td class="label">AAT</td>
                    <td id="aat" class="value">-- °F</td>

                    <td class="label">Battery</td>
                    <td id="batteryVoltage" class="value">-- V</td>
                </tr>
                <tr>
                    <td class="label">Oil Temp</td>
                    <td id="oilTemp" class="value">-- °F</td>

                    <td class="label">Oil Press</td>
                    <td id="oilPressure" class="value">-- PSI</td>
                </tr>
                <tr>
                    <td class="label">AFR</td>
                    <td id="afr" class="value">--</td>

                    <td class="label">Trans Temp</td>
                    <td id="transTemp" class="value">-- °F</td>
                </tr>
            </table>

        </div>
    </div>

</body>
